<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Contábil · FA Zanoni</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --surface2: #F0EFE9;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1A1917;
  --text2: #6B6A65;
  --text3: #A09F9A;
  --blue: #185FA5;
  --blue-bg: #E6F1FB;
  --blue-text: #0C447C;
  --green: #0F6E56;
  --green-bg: #E1F5EE;
  --green-text: #085041;
  --amber: #854F0B;
  --amber-bg: #FAEEDA;
  --amber-text: #633806;
  --purple: #534AB7;
  --purple-bg: #EEEDFE;
  --purple-text: #3C3489;
  --red: #A32D2D;
  --red-bg: #FCEBEB;
  --red-text: #791F1F;
  --radius: 8px;
  --radius-lg: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; height: 100vh; overflow: hidden; }

/* Layout */
.app { display: flex; height: 100vh; }
.sidebar { width: 240px; background: var(--surface); border-right: 0.5px solid var(--border2); display: flex; flex-direction: column; flex-shrink: 0; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* Sidebar */
.sb-logo { padding: 16px 16px 12px; border-bottom: 0.5px solid var(--border); }
.sb-logo h1 { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
.sb-logo p { font-size: 11px; color: var(--text3); margin-top: 2px; }
.sb-logo span { font-size: 10px; background: var(--green-bg); color: var(--green-text); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.sb-top { padding: 10px 12px; border-bottom: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.sb-search { position: relative; }
.sb-search input { width: 100%; padding: 7px 10px 7px 30px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface2); font-family: inherit; font-size: 12px; color: var(--text); outline: none; }
.sb-search input:focus { border-color: var(--blue); }
.sb-search svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; stroke: var(--text3); fill: none; }
.sb-filters { display: flex; gap: 4px; flex-wrap: wrap; }
.fb { font-size: 10px; padding: 3px 8px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; font-weight: 500; transition: all .15s; }
.fb:hover { background: var(--surface2); }
.fb.on { background: var(--blue-bg); color: var(--blue-text); border-color: transparent; }
.sb-count { font-size: 10px; color: var(--text3); padding: 0 4px; }
.client-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.client-list::-webkit-scrollbar { width: 4px; }
.client-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
.cli-item { display: flex; align-items: center; gap: 9px; padding: 8px 12px; cursor: pointer; border-left: 2px solid transparent; transition: background .1s; }
.cli-item:hover { background: var(--surface2); }
.cli-item.active { background: var(--blue-bg); border-left-color: var(--blue); }
.cli-av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
.cli-info { min-width: 0; }
.cli-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
.cli-regime { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* Header */
.hdr { padding: 14px 20px; background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.hdr-left { display: flex; align-items: center; gap: 12px; }
.hdr-av { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
.hdr-name { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
.hdr-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.01em; }
.b-sn { background: var(--green-bg); color: var(--green-text); }
.b-lp { background: var(--purple-bg); color: var(--purple-text); }
.b-mei { background: var(--amber-bg); color: var(--amber-text); }

/* Tabs */
.tabs { display: flex; padding: 0 20px; background: var(--surface); border-bottom: 0.5px solid var(--border); flex-shrink: 0; gap: 2px; }
.tab { padding: 10px 14px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; white-space: nowrap; font-family: inherit; transition: color .15s; }
.tab:hover { color: var(--text2); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 18px 20px; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
.panel { display: none; }
.panel.active { display: block; }

/* Section title */
.stitle { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }

/* Info grid */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.ic { background: var(--surface2); border-radius: var(--radius); padding: 9px 12px; }
.il { font-size: 10px; color: var(--text3); font-weight: 500; }
.iv { font-size: 13px; font-weight: 500; color: var(--text); margin-top: 3px; }

/* Detail box */
.detail-box { background: var(--surface); border: 0.5px solid var(--border2); border-left: 3px solid var(--blue); border-radius: 0 var(--radius) var(--radius) 0; padding: 12px 14px; margin-top: 4px; }
.detail-box p { font-size: 12px; color: var(--text); line-height: 1.7; }

/* Checklist */
.ck-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 12px; }
.ck-toolbar select { font-size: 12px; padding: 6px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); font-family: inherit; color: var(--text); cursor: pointer; outline: none; }
.ck-progress { flex: 1; max-width: 240px; }
.ck-prog-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
.ck-prog-lbl { font-size: 11px; color: var(--text3); }
.ck-prog-val { font-size: 11px; font-weight: 600; color: var(--green); }
.prog-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .3s ease; }

.ck-wrap { overflow-x: auto; }
.ck-wrap::-webkit-scrollbar { height: 4px; }
.ck-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.ck-table { border-collapse: collapse; font-size: 11px; min-width: 100%; }
.ck-table thead th { font-size: 10px; font-weight: 600; color: var(--text3); text-align: center; padding: 6px 4px; border-bottom: 0.5px solid var(--border2); white-space: nowrap; position: sticky; top: 0; background: var(--bg); }
.ck-table thead th:first-child { text-align: left; min-width: 120px; padding-left: 0; }
.ck-table tbody td { padding: 5px 4px; border-bottom: 0.5px solid var(--border); text-align: center; vertical-align: middle; }
.ck-table tbody td:first-child { text-align: left; font-size: 12px; font-weight: 500; color: var(--text); padding-left: 0; white-space: nowrap; }

.ck-cell { width: 24px; height: 24px; border-radius: 5px; border: 1.5px solid var(--border2); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 9px; font-weight: 700; margin: auto; transition: all .15s; user-select: none; }
.ck-cell:hover { border-color: var(--blue); }
.ck-cell.ok { background: var(--green); border-color: var(--green); color: #fff; }
.ck-cell.sm { background: var(--amber-bg); border-color: #EF9F27; color: var(--amber-text); }
.ck-cell.nd { background: var(--surface2); border-color: var(--border); color: var(--text3); cursor: default; }

/* View geral */
.geral-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.geral-toolbar select { font-size: 12px; padding: 6px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); font-family: inherit; color: var(--text); cursor: pointer; outline: none; }
.geral-wrap { overflow-x: auto; }
.geral-wrap::-webkit-scrollbar { height: 4px; }
.geral-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
.geral-table { border-collapse: collapse; font-size: 11px; min-width: 100%; }
.geral-table th { font-size: 10px; font-weight: 600; color: var(--text3); text-align: center; padding: 6px 5px; border-bottom: 0.5px solid var(--border2); white-space: nowrap; background: var(--bg); }
.geral-table th:first-child { text-align: left; padding-left: 0; min-width: 110px; }
.geral-table td { padding: 5px 5px; border-bottom: 0.5px solid var(--border); text-align: center; vertical-align: middle; }
.geral-table td:first-child { text-align: left; font-size: 11px; font-weight: 500; color: var(--text); padding-left: 0; white-space: nowrap; cursor: pointer; color: var(--blue); }
.geral-table td:first-child:hover { text-decoration: underline; }
.gc { width: 22px; height: 22px; border-radius: 4px; border: 1.5px solid var(--border2); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 8px; font-weight: 700; margin: auto; transition: all .15s; }
.gc:hover { border-color: var(--blue); }
.gc.ok { background: var(--green); border-color: var(--green); color: #fff; }
.gc.sm { background: var(--amber-bg); border-color: #EF9F27; color: var(--amber-text); }
.gc.nd { background: var(--surface2); border-color: var(--border); color: var(--text3); cursor: default; }

/* Acessos */
.pw-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 13px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; }
.pw-sys { font-size: 12px; font-weight: 600; color: var(--text); }
.pw-login { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.pw-right { display: flex; align-items: center; gap: 8px; }
.pw-val { font-size: 11px; font-family: 'DM Mono', monospace; background: var(--surface2); padding: 4px 9px; border-radius: var(--radius); color: var(--text2); letter-spacing: 2px; min-width: 90px; text-align: center; }
.pw-btn { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 4px 8px; font-size: 11px; cursor: pointer; color: var(--text2); font-family: inherit; transition: all .15s; }
.pw-btn:hover { background: var(--surface2); }
.pw-edit { width: 100%; margin-top: 3px; font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 8px; border-radius: var(--radius); border: 0.5px solid var(--blue); outline: none; background: var(--surface); color: var(--text); }

/* Taxa */
.taxa-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
.taxa-lbl { font-size: 13px; font-weight: 600; color: var(--text); }
.taxa-dt { font-size: 11px; color: var(--text3); margin-top: 2px; }
.ts-ok { background: var(--green-bg); color: var(--green-text); }
.ts-pend { background: var(--amber-bg); color: var(--amber-text); }
.ts-isento { background: var(--surface2); color: var(--text3); }

/* Nav global */
.nav-global { display: flex; padding: 0 20px; background: var(--surface); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.nav-tab { padding: 10px 14px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; transition: color .15s; font-family: inherit; }
.nav-tab:hover { color: var(--text2); }
.nav-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

/* Views */
.view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.view.active { display: flex; }

/* Empty state */
.empty { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text3); font-size: 13px; }

/* Stats bar */
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border-radius: var(--radius); padding: 12px 14px; border: 0.5px solid var(--border); }
.stat-lbl { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
.stat-val { font-size: 22px; font-weight: 600; color: var(--text); margin-top: 4px; letter-spacing: -0.02em; }
.stat-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sb-logo">
      <h1>FA Zanoni Contábil</h1>
      <p>Gestão de Clientes · <span id="cli-count-badge">61</span></p>
    </div>
    <div class="sb-top">
      <div class="sb-search">
        <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4.5" stroke-width="1.5"/><path d="M10 10l3 3" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" id="search-input" placeholder="Buscar cliente..." oninput="filterClients()">
      </div>
      <div class="sb-filters">
        <button class="fb on" onclick="setFilter('TODOS',this)">Todos</button>
        <button class="fb" onclick="setFilter('SN',this)">SN</button>
        <button class="fb" onclick="setFilter('LP',this)">LP</button>
        <button class="fb" onclick="setFilter('MEI',this)">MEI</button>
      </div>
    </div>
    <div class="client-list" id="client-list"></div>
  </div>

  <div class="main">
    <div class="nav-global">
      <button class="nav-tab active" onclick="switchView('cliente',this)">Ficha do cliente</button>
      <button class="nav-tab" onclick="switchView('geral',this)">Checklist geral</button>
    </div>

    <!-- VIEW: CLIENTE -->
    <div class="view active" id="view-cliente">
      <div class="hdr">
        <div class="hdr-left">
          <div class="hdr-av" id="hd-av"></div>
          <div>
            <div class="hdr-name" id="hd-name">—</div>
            <div class="hdr-sub" id="hd-sub">—</div>
          </div>
        </div>
        <span class="badge" id="hd-badge">—</span>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('dados',this)">Dados</button>
        <button class="tab" onclick="switchTab('checklist',this)">Checklist mensal</button>
        <button class="tab" onclick="switchTab('acessos',this)">Acessos</button>
        <button class="tab" onclick="switchTab('taxa',this)">Taxa anual</button>
      </div>
      <div class="content">
        <div class="panel active" id="panel-dados"></div>
        <div class="panel" id="panel-checklist"></div>
        <div class="panel" id="panel-acessos"></div>
        <div class="panel" id="panel-taxa"></div>
      </div>
    </div>

    <!-- VIEW: GERAL -->
    <div class="view" id="view-geral">
      <div class="hdr">
        <div>
          <div class="hdr-name">Checklist geral do mês</div>
          <div class="hdr-sub">Visão consolidada de todas as obrigações</div>
        </div>
      </div>
      <div class="content">
        <div class="stats-bar" id="stats-bar"></div>
        <div class="geral-toolbar">
          <select id="geral-month" onchange="renderGeral()">
            <option value="2026-04">Abril / 2026</option>
            <option value="2026-03">Março / 2026</option>
            <option value="2026-02">Fevereiro / 2026</option>
            <option value="2026-01">Janeiro / 2026</option>
          </select>
          <div class="sb-filters">
            <button class="fb on" id="gfb-todos" onclick="setGeralFilter('TODOS',this)">Todos</button>
            <button class="fb" id="gfb-sn" onclick="setGeralFilter('SN',this)">SN/MEI</button>
            <button class="fb" id="gfb-lp" onclick="setGeralFilter('LP',this)">Presumido</button>
          </div>
        </div>
        <div class="geral-wrap" id="geral-wrap"></div>
      </div>
    </div>

  </div>
</div>

<script>
const COLS_SN = ["NFSe Prest.","EFD Reinf","Guia ISS Ret.","Dec. Pref.","NFe Ent.","ICMS Difal","CTe Ent.","NFe Saídas","NFCe Saídas","Parcelamento","PERDCOMP","Apuração","Transmitido","DAS SN"];
const COLS_LP = ["NFSe Prest.","ISS Prest.","IRRF Prest.","CSRF Prest.","INSS Prest.","NFSe Tom.","ISS Tom.","IRRF Tom.","CSRF Tom.","INSS Tom.","EFD Reinf","ISS Fat.","Guia ISS Ret.","Dec. Pref.","NFe Ent.","CTe Ent.","NFe Saídas","Parcelamento","MIT","PIS/COFINS","EFD PIS/COF","IRPJ/CSLL","Adic. IR","DCTFWeb","DARE ICMS","EFD ICMS","PERDCOMP"];
const COLS_MEI = ["NFe Ent.","NFCe Saídas","Apuração","Transmitido","DAS MEI"];

const AV_COLORS = [
  {bg:'#E6F1FB',cl:'#0C447C'},{bg:'#E1F5EE',cl:'#085041'},{bg:'#EEEDFE',cl:'#3C3489'},
  {bg:'#FAEEDA',cl:'#633806'},{bg:'#FAECE7',cl:'#712B13'},{bg:'#FBEAF0',cl:'#72243E'}
];

let clientes = [];
let checklist = {};
let currentFilter = 'TODOS';
let geralFilter = 'TODOS';
let currentId = null;
let pwVisible = {};
let pwEditing = {};

function initChecklist(id, regime) {
  const cols = regime === 'LP' ? COLS_LP : regime === 'MEI' ? COLS_MEI : COLS_SN;
  const months = ['2026-04','2026-03','2026-02','2026-01'];
  if (!checklist[id]) checklist[id] = {};
  months.forEach(m => {
    if (!checklist[id][m]) {
      checklist[id][m] = cols.map(() => 0);
    }
  });
}

function saveData() {
  try { localStorage.setItem('ck_data', JSON.stringify(checklist)); } catch(e) {}
}

function loadData() {
  try {
    const d = localStorage.getItem('ck_data');
    if (d) checklist = JSON.parse(d);
  } catch(e) {}
}

function getInitials(ap) {
  const clean = ap.replace(/[^A-Za-zÀ-ú]/g,' ').trim().split(/\s+/);
  if (clean.length >= 2) return (clean[0][0] + clean[1][0]).toUpperCase();
  return ap.slice(0,2).toUpperCase();
}

function avColor(id) { return AV_COLORS[id % AV_COLORS.length]; }

function getCols(regime) {
  return regime === 'LP' ? COLS_LP : regime === 'MEI' ? COLS_MEI : COLS_SN;
}

function renderSidebar() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = clientes.filter(c => {
    const rm = currentFilter === 'TODOS' || c.regime === currentFilter;
    const rs = c.ap.toLowerCase().includes(q) || c.nome.toLowerCase().includes(q) || c.cnpj.includes(q);
    return rm && rs;
  });
  document.getElementById('cli-count-badge').textContent = list.length;
  const el = document.getElementById('client-list');
  el.innerHTML = '';
  list.forEach(c => {
    const av = avColor(c.id);
    const div = document.createElement('div');
    div.className = 'cli-item' + (c.id === currentId ? ' active' : '');
    div.onclick = () => selectClient(c.id);
    div.innerHTML = `<div class="cli-av" style="background:${av.bg};color:${av.cl}">${getInitials(c.ap)}</div>
      <div class="cli-info"><div class="cli-name">${c.ap}</div><div class="cli-regime">${c.regime} · ${c.pref}</div></div>`;
    el.appendChild(div);
  });
}

function filterClients() { renderSidebar(); }
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.sb-filters .fb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderSidebar();
}

function selectClient(id) {
  currentId = id;
  renderSidebar();
  const c = clientes.find(x => x.id === id);
  if (!c) return;
  initChecklist(id, c.regime);
  const av = avColor(id);
  const hdAv = document.getElementById('hd-av');
  hdAv.style.background = av.bg; hdAv.style.color = av.cl;
  hdAv.textContent = getInitials(c.ap);
  document.getElementById('hd-name').textContent = c.nome;
  document.getElementById('hd-sub').textContent = 'CNPJ: ' + c.cnpj + (c.im ? ' · IM: ' + c.im : '') + ' · ' + c.pref;
  const bdg = document.getElementById('hd-badge');
  bdg.textContent = c.regime + (c.anexo && c.anexo !== '-' ? ' · ' + c.anexo : '');
  bdg.className = 'badge ' + (c.regime === 'SN' ? 'b-sn' : c.regime === 'LP' ? 'b-lp' : 'b-mei');
  renderDados(c);
  renderChecklist(c);
  renderAcessos(c);
  renderTaxa(c);

  // switch to client view
  document.getElementById('view-cliente').classList.add('active');
  document.getElementById('view-geral').classList.remove('active');
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i===0));
}

function renderDados(c) {
  document.getElementById('panel-dados').innerHTML = `
    <p class="stitle">Informações cadastrais</p>
    <div class="info-grid">
      <div class="ic"><div class="il">Apelido</div><div class="iv">${c.ap}</div></div>
      <div class="ic"><div class="il">Regime tributário</div><div class="iv">${c.regime}</div></div>
      <div class="ic"><div class="il">CNPJ</div><div class="iv" style="font-family:'DM Mono',monospace;font-size:12px">${c.cnpj}</div></div>
      <div class="ic"><div class="il">Insc. estadual</div><div class="iv">${c.ie || '—'}</div></div>
      <div class="ic"><div class="il">Insc. municipal</div><div class="iv">${c.im || '—'}</div></div>
      <div class="ic"><div class="il">Prefeitura</div><div class="iv">${c.pref}</div></div>
      <div class="ic"><div class="il">Anexo / LP</div><div class="iv">${c.anexo || '—'}</div></div>
      <div class="ic"><div class="il">Folha de pagamento</div><div class="iv">${c.folha || '—'}</div></div>
      <div class="ic"><div class="il">Parcelamento</div><div class="iv">${c.parcel}</div></div>
      <div class="ic"><div class="il">Importação NFS</div><div class="iv" style="font-size:11px">${c.importar || '—'}</div></div>
    </div>
    <p class="stitle">Observação tributária</p>
    <div class="detail-box"><p>${c.detalhe}</p></div>
  `;
}

function renderChecklist(c) {
  if (!c) c = clientes.find(x => x.id === currentId);
  if (!c) return;
  initChecklist(c.id, c.regime);
  const cols = getCols(c.regime);
  const month = document.querySelector('#panel-checklist select')?.value || '2026-04';
  const status = checklist[c.id][month] || cols.map(() => 0);
  const done = status.filter(s => s === 1).length;
  const na = status.filter(s => s === 2).length;
  const total = cols.length - na;
  const pct = total > 0 ? Math.round(done / total * 100) : 100;

  let html = `<div class="ck-toolbar">
    <select onchange="renderChecklist()">
      <option value="2026-04">Abril / 2026</option>
      <option value="2026-03">Março / 2026</option>
      <option value="2026-02">Fevereiro / 2026</option>
      <option value="2026-01">Janeiro / 2026</option>
    </select>
    <div class="ck-progress">
      <div class="ck-prog-top">
        <span class="ck-prog-lbl">${done} de ${total} concluídos</span>
        <span class="ck-prog-val">${pct}%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
  </div>
  <div class="ck-wrap"><table class="ck-table">
    <thead><tr><th>Obrigação</th>`;
  cols.forEach(col => { html += `<th title="${col}">${col}</th>`; });
  html += `</tr></thead><tbody><tr><td>${c.ap}</td>`;
  status.forEach((s, i) => {
    const cls = s === 1 ? 'ok' : s === 2 ? 'sm' : '';
    const lbl = s === 1 ? '✓' : s === 2 ? 'N/A' : '';
    html += `<td><div class="ck-cell ${cls}" onclick="toggleCkCell(${i})" title="${cols[i]}">${lbl}</div></td>`;
  });
  html += `</tr></tbody></table></div>`;
  document.getElementById('panel-checklist').innerHTML = html;
  document.querySelector('#panel-checklist select').value = month;
}

function toggleCkCell(i) {
  const c = clientes.find(x => x.id === currentId);
  if (!c) return;
  const month = document.querySelector('#panel-checklist select').value;
  const arr = checklist[c.id][month];
  if (arr[i] === 2) return;
  arr[i] = arr[i] === 1 ? 0 : 1;
  saveData();
  renderChecklist(c);
}

function renderAcessos(c) {
  let html = `<p class="stitle">Credenciais de acesso</p>`;
  c.acessos.forEach((a, i) => {
    const key = c.id + '-' + i;
    const vis = pwVisible[key];
    const editing = pwEditing[key];
    const displayPw = vis ? (a.pw || '(vazio)') : '••••••••';
    html += `<div class="pw-item">
      <div>
        <div class="pw-sys">${a.sys}</div>
        <div class="pw-login">${a.login || '—'}</div>
        ${editing ? `<input class="pw-edit" id="pwe-${key}" value="${a.pw}" placeholder="Digite a senha..." onblur="savePw(${c.id},${i})">` : ''}
      </div>
      <div class="pw-right">
        ${!editing ? `<span class="pw-val">${displayPw}</span>` : ''}
        <button class="pw-btn" onclick="togglePwVis('${key}')">${vis ? 'Ocultar' : 'Ver'}</button>
        <button class="pw-btn" onclick="editPw('${key}',${c.id},${i})">${editing ? 'Salvar' : 'Editar'}</button>
      </div>
    </div>`;
  });
  document.getElementById('panel-acessos').innerHTML = html;
}

function togglePwVis(key) {
  pwVisible[key] = !pwVisible[key];
  renderAcessos(clientes.find(x => x.id === currentId));
}

function editPw(key, cid, i) {
  if (pwEditing[key]) {
    savePw(cid, i);
  } else {
    pwEditing[key] = true;
    renderAcessos(clientes.find(x => x.id === cid));
    setTimeout(() => { const el = document.getElementById('pwe-' + key); if (el) el.focus(); }, 50);
  }
}

function savePw(cid, i) {
  const key = cid + '-' + i;
  const el = document.getElementById('pwe-' + key);
  if (el) { clientes.find(x => x.id === cid).acessos[i].pw = el.value; }
  delete pwEditing[key];
  saveData();
  renderAcessos(clientes.find(x => x.id === cid));
}

function renderTaxa(c) {
  const isSent = s => s && (s.includes('ENVIADO') || s === 'ISENTO');
  const cls2025 = isSent(c.taxa2025) ? 'ts-ok' : c.taxa2025 === '-' ? 'ts-isento' : 'ts-pend';
  const cls2026 = isSent(c.taxa2026) ? 'ts-ok' : c.taxa2026 === '-' ? 'ts-isento' : 'ts-pend';
  document.getElementById('panel-taxa').innerHTML = `
    <p class="stitle">Taxa anual de fiscalização</p>
    <div class="taxa-row">
      <div><div class="taxa-lbl">Taxa anual 2025</div><div class="taxa-dt">${c.taxa2025dt || '—'}</div></div>
      <span class="badge ${cls2025}">${c.taxa2025 || '—'}</span>
    </div>
    <div class="taxa-row">
      <div><div class="taxa-lbl">Taxa anual 2026</div><div class="taxa-dt">${c.taxa2026dt || '—'}</div></div>
      <span class="badge ${cls2026}">${c.taxa2026 || '—'}</span>
    </div>
  `;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#view-cliente .panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'checklist') renderChecklist();
}

function switchView(v, btn) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-cliente').classList.toggle('active', v === 'cliente');
  document.getElementById('view-geral').classList.toggle('active', v === 'geral');
  if (v === 'geral') renderGeral();
}

function setGeralFilter(f, btn) {
  geralFilter = f;
  document.querySelectorAll('#view-geral .fb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderGeral();
}

function renderGeral() {
  const month = document.getElementById('geral-month').value;
  let list = clientes;
  if (geralFilter === 'SN') list = clientes.filter(c => c.regime === 'SN' || c.regime === 'MEI');
  if (geralFilter === 'LP') list = clientes.filter(c => c.regime === 'LP');

  // Stats
  let totalOk = 0, totalPend = 0, totalCli = list.length;
  list.forEach(c => {
    initChecklist(c.id, c.regime);
    const cols = getCols(c.regime);
    const st = checklist[c.id][month] || cols.map(() => 0);
    totalOk += st.filter(s => s === 1).length;
    totalPend += st.filter(s => s === 0).length;
  });
  const pctGeral = totalOk + totalPend > 0 ? Math.round(totalOk / (totalOk + totalPend) * 100) : 0;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-lbl">Clientes</div><div class="stat-val">${totalCli}</div><div class="stat-sub">na visão atual</div></div>
    <div class="stat-card"><div class="stat-lbl">Concluídas</div><div class="stat-val" style="color:var(--green)">${totalOk}</div><div class="stat-sub">obrigações OK</div></div>
    <div class="stat-card"><div class="stat-lbl">Pendentes</div><div class="stat-val" style="color:var(--amber)">${totalPend}</div><div class="stat-sub">a completar</div></div>
    <div class="stat-card"><div class="stat-lbl">Progresso</div><div class="stat-val">${pctGeral}%</div><div class="stat-sub">do mês concluído</div></div>
  `;

  if (geralFilter === 'TODOS') {
    // split in two tables
    renderGeralTable(list.filter(c => c.regime !== 'LP'), month, 'SN / MEI', COLS_SN);
    const lpEl = document.createElement('div');
    lpEl.style.marginTop = '24px';
    renderGeralTableLP(list.filter(c => c.regime === 'LP'), month);
    return;
  }

  const cols = geralFilter === 'LP' ? COLS_LP : COLS_SN;
  renderGeralTable(list, month, geralFilter === 'LP' ? 'Lucro Presumido' : 'Simples Nacional / MEI', cols);
}

function renderGeralTable(list, month, title, cols) {
  const wrap = document.getElementById('geral-wrap');
  wrap.innerHTML = '';
  if (list.length === 0) { wrap.innerHTML = '<div class="empty">Nenhum cliente nesta categoria</div>'; return; }

  let html = `<p class="stitle" style="margin-bottom:8px">${title}</p><table class="geral-table"><thead><tr><th>Cliente</th>`;
  cols.forEach(c => { html += `<th title="${c}">${c}</th>`; });
  html += `</tr></thead><tbody>`;

  list.forEach(c => {
    initChecklist(c.id, c.regime);
    const cCols = getCols(c.regime);
    const st = checklist[c.id][month] || cCols.map(() => 0);
    html += `<tr><td onclick="goToClient(${c.id})">${c.ap}</td>`;
    cols.forEach((col, ci) => {
      const idx = cCols.indexOf(col);
      if (idx === -1) {
        html += `<td><div class="gc nd" title="N/A">—</div></td>`;
      } else {
        const s = st[idx] || 0;
        const cls = s === 1 ? 'ok' : s === 2 ? 'sm' : '';
        const lbl = s === 1 ? '✓' : s === 2 ? 'N/A' : '';
        html += `<td><div class="gc ${cls}" onclick="toggleGeralCell(${c.id},${idx},this)" title="${col}">${lbl}</div></td>`;
      }
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  wrap.innerHTML = html;
  document.querySelector('#geral-wrap').style.marginTop = '0';
}

function renderGeralTableLP(list, month) {
  if (list.length === 0) return;
  const wrap = document.getElementById('geral-wrap');
  let html = `<p class="stitle" style="margin-bottom:8px;margin-top:20px">Lucro Presumido</p><table class="geral-table"><thead><tr><th>Cliente</th>`;
  COLS_LP.forEach(c => { html += `<th title="${c}">${c}</th>`; });
  html += `</tr></thead><tbody>`;
  list.forEach(c => {
    initChecklist(c.id, c.regime);
    const st = checklist[c.id][month] || COLS_LP.map(() => 0);
    html += `<tr><td onclick="goToClient(${c.id})">${c.ap}</td>`;
    COLS_LP.forEach((col, ci) => {
      const s = st[ci] || 0;
      const cls = s === 1 ? 'ok' : s === 2 ? 'sm' : '';
      const lbl = s === 1 ? '✓' : s === 2 ? 'N/A' : '';
      html += `<td><div class="gc ${cls}" onclick="toggleGeralCell(${c.id},${ci},this)" title="${col}">${lbl}</div></td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  wrap.innerHTML += html;
}

function toggleGeralCell(cid, idx, el) {
  const c = clientes.find(x => x.id === cid);
  if (!c) return;
  const month = document.getElementById('geral-month').value;
  initChecklist(cid, c.regime);
  const arr = checklist[cid][month];
  if (arr[idx] === 2) return;
  arr[idx] = arr[idx] === 1 ? 0 : 1;
  const s = arr[idx];
  el.className = 'gc ' + (s === 1 ? 'ok' : '');
  el.textContent = s === 1 ? '✓' : '';
  saveData();
  if (document.getElementById('view-geral').classList.contains('active')) {
    const totalOk = Object.values(checklist).reduce((acc, months) => {
      return acc + Object.values(months).reduce((a, arr) => a + arr.filter(s => s===1).length, 0);
    }, 0);
  }
}

function goToClient(id) {
  selectClient(id);
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i===0));
  document.getElementById('view-cliente').classList.add('active');
  document.getElementById('view-geral').classList.remove('active');
}

async function init() {
  try {
    const r = await fetch('clientes.json');
    clientes = await r.json();
  } catch(e) {
    clientes = [];
  }
  loadData();
  clientes.forEach(c => initChecklist(c.id, c.regime));
  renderSidebar();
  if (clientes.length > 0) selectClient(clientes[0].id);
}

init();
</script>
</body>
</html>
