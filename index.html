function ini(ap){const w=ap.replace(/[()]/g,' ').trim().split(/\s+/);return w.length>=2?(w[0][0]+w[1][0]).toUpperCase():ap.slice(0,2).toUpperCase()}
function avc(id){return AVC[Math.abs(id)%AVC.length]}
function nxtId(){return clientes.length>0?Math.max(...clientes.map(c=>c.id))+1:1}

function genMonths(){
  const o=[];const now=new Date();
  for(let i=0;i<24;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const v=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const n=['Janeiro','Fevereiro','MarÃ§o','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][d.getMonth()]+' / '+d.getFullYear();
    o.push({v,n});
  }
  return o;
}

function buildGroupHeaders(cols,hasGroups){
  if(!hasGroups)return'';
  const seen={};let row='<tr><th class="grp sticky-top sticky-left" style="background:var(--surface)"></th>';
  cols.forEach(col=>{
    if(col.g){
      if(!seen[col.g]){
        const span=cols.filter(x=>x.g===col.g).length;
        seen[col.g]=true;
        row+=`<th class="grp sticky-top" colspan="${span}" style="background:var(--surface2);color:var(--text2);font-size:9px;text-align:center">${col.g}</th>`;
      }
    } else {
      row+=`<th class="grp sticky-top" style="background:var(--surface)"></th>`;
    }
  });
  return row+'</tr>';
}

  const done=cols.filter(col=>st[col.k]===1).length;

  const total=cols.length-na;
  const pct=total>0?Math.round(done/total*100):100;
  const months=genMonths();
  const mOpts=months.map(m=>`<option value="${m.v}"${m.v===month?' selected':''}>${m.n}</option>`).join('');

function buildTable(list,month,cols,title,hasGroups){
  if(!list.length)return'';
  let grpRow='';
  if(hasGroups&&cols.some(c=>c.g)){
    const seen={};grpRow='<tr>';
    grpRow+=`<th class="sticky-top sticky-left" style="background:var(--surface);top:0"></th>`;
    cols.forEach(col=>{
      if(col.g){
        if(!seen[col.g]){const span=cols.filter(x=>x.g===col.g).length;seen[col.g]=true;grpRow+=`<th class="grp-h sticky-top" colspan="${span}" style="top:0;text-align:center">${col.g}</th>`;}
      }else{
        grpRow+=`<th class="sticky-top" style="top:0;background:var(--surface)"></th>`;
      }
    });
    grpRow+='</tr>';
  }
  const top=grpRow?'26px':'0';
  let thead=`<tr><th class="sticky-top sticky-left" style="top:${top};background:var(--surface)">${title}</th>`;
  cols.forEach(col=>{thead+=`<th class="sticky-top" style="top:${top}" title="${col.l}">${col.l}</th>`;});
  thead+='</tr>';
  let tbody='';
  list.forEach(c=>{
    initCk(c.id,c.regime);const cCols=getCols(c.regime);const st=checklist[c.id][month]||{};
    tbody+=`<tr><td class="sticky-left" onclick="goToClient(${c.id})">${c.ap}</td>`;
    cols.forEach(col=>{
      const cc=cCols.find(x=>x.k===col.k);
      if(!cc){tbody+=`<td><div class="gc nd">â€”</div></td>`;return;}
      const s=st[col.k]||0;const cls=s===1?'ok':s===2?'sm':'';const lbl=s===1?'âœ“':s===2?'N/A':'';
      tbody+=`<td><div class="gc ${cls}" onclick="toggleGeral(${c.id},'${col.k}',this)" title="${col.l}">${lbl}</div></td>`;
    });
    tbody+='</tr>';
  });
  return`<table class="geral-table"><thead>${grpRow}${thead}</thead><tbody>${tbody}</tbody></table>`;
}

  }else{
    data.id=nxtId();
    data.acessos=[{sys:"e-CAC / Receita Federal",login:data.cnpj.replace(/\D/g,''),pw:''},{sys:"Prefeitura "+data.pref,login:'',pw:''},{sys:"Certificado Digital",login:'Vencimento: ',pw:''}];
    clientes.push(data);curId=data.id;
  }
  initCk(curId,data.regime);saveAll();closeModal();renderSidebar();selectClient(curId);
}

function confirmDelete(){
  const c=clientes.find(x=>x.id===curId);if(!c)return;
  if(!confirm('Excluir '+c.ap+'? Esta aÃ§Ã£o nÃ£o pode ser desfeita.'))return;
  clientes=clientes.filter(x=>x.id!==curId);delete checklist[curId];saveAll();curId=null;renderSidebar();
  const sorted=[...clientes].sort((a,b)=>a.ap.localeCompare(b.ap,'pt-BR'));
  if(sorted.length>0)selectClient(sorted[0].id);
}
function deleteFromModal(){closeModal();confirmDelete();}

function switchTab(tab,btn){
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#view-cliente .panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='checklist')renderChecklist();
}
function switchView(v,btn){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  document.getElementById('view-cliente').classList.toggle('active',v==='cliente');
  document.getElementById('view-geral').classList.toggle('active',v==='geral');
  if(v==='geral'){setTimeout(()=>renderGeral(),50);}
}

a5ync function init(){
  loadAll();
  if(clientes.length===0){
    try{const r=await fetch('clientes.json');const data=await r.json();clientes=data.map(c=>({...c,nome:(c.nome||'').toUpperCase(),ap:(c.ap||'').toUpperCase()}));}catch(e){clientes=[];}
  }
  const months=genMonths();
  const gSel=document.getElementById('geral-month');
  gSel.innerHTML='';months.forEach(m=>{const o=document.createElement('option');o.value=m.v;o.textContent=m.n;gSel.appendChild(o);});
  clientes.forEach(c=>initCk(c.id,c.regime));
  renderSidebar();
  const sorted=[...clientes].sort((a,b)=>a.ap.localeCompare(b.ap,'pt-BR'));
  if(sorted.length>0)selectClient(sorted[0].id);
}
init();
